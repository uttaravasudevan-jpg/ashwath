let selectedPoet = 'any';
let selectedTheme = 'any';
let lastIndex = -1;

function getFiltered() {
  return ALL_QUOTES.filter(q => {
    const poetMatch = selectedPoet === 'any' || q.poet === selectedPoet;
    const themeMatch = selectedTheme === 'any' || q.theme === selectedTheme;
    return poetMatch && themeMatch;
  });
}

function renderQuote(q) {
  const card = document.getElementById('quote-card');
  card.innerHTML = `
    <div class="fade-in">
      <span class="theme-label">${q.theme}</span>
      <div class="verse-tamil">${q.tamil.replace(/\n/g,'<br>')}</div>
      <div class="verse-translation">${q.translation.replace(/\n/g,'<br>')}</div>
      <div class="rule"></div>
      <div class="poet-line">
        <span class="poet-name">${q.poet}</span>
        <span class="poet-era">${q.era}</span>
      </div>
      <div class="context-text">${q.context}</div>
      <div class="relevance-wrap">
        <span class="relevance-label">Why this matters now</span>
        <div class="relevance-text">${q.relevance}</div>
      </div>
    </div>
  `;
  document.getElementById('source-line').textContent = q.source;
}

function nextQuote() {
  const pool = getFiltered();
  if (!pool.length) {
    document.getElementById('quote-card').innerHTML = `<div style="font-style:italic;font-size:1rem;color:var(--muted);padding:1rem 0;">No verses found for this combination. Try a different filter.</div>`;
    document.getElementById('source-line').textContent = '';
    return;
  }
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (pool.length > 1 && idx === lastIndex);
  lastIndex = idx;
  renderQuote(pool[idx]);
}

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPoet = btn.dataset.poet;
    lastIndex = -1;
    nextQuote();
  });
});

document.querySelectorAll('.theme').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTheme = btn.dataset.theme;
    lastIndex = -1;
    nextQuote();
  });
});

nextQuote();
</script>
